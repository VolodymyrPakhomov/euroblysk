<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1008 1061">
  <defs>
    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0.5" y1="1" x2="0.5" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0284C7"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <!-- Bottle body gradient -->
    <linearGradient id="bottleGrad" x1="0.2" y1="1" x2="0.8" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0EA5E9"/>
      <stop offset="45%"  stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>

    <!-- Sparkle / drop gradient -->
    <linearGradient id="sparkleGrad" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#D97706"/>
      <stop offset="50%"  stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>

    <!-- Gloss highlight on bottle -->
    <linearGradient id="glossGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-8%" y="-6%" width="116%" height="116%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#0284C7" flood-opacity="0.28"/>
    </filter>

    <!-- Outer glow for sparkle -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

